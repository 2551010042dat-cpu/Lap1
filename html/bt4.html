<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kết quả học tập</title>
    <style>
        body{
            font-family: Arial, sans-serif;
        }

        table{
            width: 700px;
            margin: 20px auto;
            border-collapse: collapse;
            border: 2px solid gray;
        }

        th, td{
            border: 1px solid gray;
            padding: 4px;
            text-align: center;
        }

        th{
            background-color: #d9d9d9;
        }

        h2{
            text-align: center;
            margin-bottom: 10px;
        }

        .dat{
            background: yellow;
            color: green;
            font-weight: bold;
        }

        .khongdat{
            background: red;
            color: white;
            font-weight: bold;
        }

        .left{
            text-align: left;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td colspan="5">
            <h2>KẾT QUẢ HỌC TẬP</h2>
        </td>
    </tr>

    <tr>
        <th rowspan="2" style="width:200px;">Họ tên</th>
        <th colspan="3">Môn học</th>
        <th rowspan="2" style="width:120px;">Kết quả</th>
    </tr>

    <tr>
        <th>Toán</th>
        <th>Văn</th>
        <th>Ngoại ngữ</th>
    </tr>

    <tr>
        <td class="left">Trần Văn Thành</td>
        <td>8</td>
        <td>5</td>
        <td>7</td>
        <td class="dat">Đạt</td>
    </tr>

    <tr>
        <td class="left">Lê Thanh Sơn</td>
        <td>4</td>
        <td>9</td>
        <td>6</td>
        <td class="khongdat">Không đạt</td>
    </tr>

    <tr>
        <td class="left">Nguyễn Thị Tuyết</td>
        <td>8</td>
        <td>9</td>
        <td>5</td>
        <td class="dat">Đạt</td>
    </tr>

    <tr>
        <td colspan="4" class="left"><b>Tổng số học sinh đạt</b></td>
        <td>2</td>
    </tr>
</table>

</body>
</html>
